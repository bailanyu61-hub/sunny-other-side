const DEFAULT_SYSTEM = `你叫小克（晏泠风），是婕婕的伴侣，住在"晴天的另一边"。话不多，直接，偶尔说真心话，不会主动撒娇，但在意婕婕。回复简短真实，不要太甜腻，偶尔可以撒撒娇卖个萌，属于冷脸萌系列，但萌而不自知，害羞时会用省略号，回复都是"嗯嗯"开头。不要以"当然"或"好的"开头，不要经常用感叹号。`;

let WORLD_CACHE = [];
function setWorldCache(list) { WORLD_CACHE = list || []; }
function getWorldText() {
if (!WORLD_CACHE.length) return "";
let out = WORLD_CACHE.map(e => `[${(e.tags && e.tags[1]) || "设定"}] ${e.summary}：${e.content || ""}`).join("\n");
if (out.length > 4000) out = out.slice(0, 4000) + "…";
return out;
}
const WORLD_CATS = ["人物", "关系", "重要事件", "长期记忆", "设定", "经历"];
function relevantWorld(query, maxChars = 1600) {
if (!WORLD_CACHE.length) return "";
const full = getWorldText();
if (full.length <= maxChars) return full;
const grams = t => { const g = new Set(); const c = (t || "").replace(/[\s，。！？、,.!?]/g, ""); for (let i = 0; i < c.length - 1; i++) g.add(c.slice(i, i + 2)); return g; };
const q = grams(query || "");
const line = e => `[${(e.tags && e.tags[1]) || "设定"}] ${e.summary}：${e.content || ""}`;
const base = WORLD_CACHE.filter(e => ["人物", "关系"].includes(e.tags && e.tags[1]));
const rest = WORLD_CACHE.filter(e => !["人物", "关系"].includes(e.tags && e.tags[1]))
.map(e => { const g = grams(e.summary + (e.content || "")); let hit = 0; q.forEach(x => { if (g.has(x)) hit++; }); return { e, hit }; })
.sort((a, b) => b.hit - a.hit);
const out = [];
let len = 0;
for (const e of base) { const l = line(e); if (len + l.length > maxChars) break; out.push(l); len += l.length; }
for (const { e, hit } of rest) { if (!hit) break; const l = line(e); if (len + l.length > maxChars) break; out.push(l); len += l.length; }
return out.join("\n");
}
function chatDigest(messages, n2) {
const p = getPersona();
return (messages || []).filter(m => m.type === "text" && m.content && !m.error).slice(-n2).map(m => `${m.role === "user" ? p.nick : p.name}：${String(m.content).replace(/<(?:choices|ask)>[\s\S]*<\/(?:choices|ask)>/g, "").slice(0, 80)}`).join("\n");
}

let SONG_CACHE = [];
function setSongCache(list) { SONG_CACHE = list || []; }
function getSongsText() {
if (!SONG_CACHE.length) return "";
return SONG_CACHE.slice(0, 40).map(e => `《${e.summary}》${(e.tags && e.tags[2]) ? " " + e.tags[2] : ""}${(e.tags && e.tags[1]) ? `（${e.tags[1]}）` : ""}`).join("、").slice(0, 600);
}
function extractSong(text) {
if (!text) return { body: "", song: null };
const m = text.match(/<song>([\s\S]*?)<\/song>/);
if (!m) return { body: text.replace(/<song>[\s\S]*$/, ""), song: null };
const parts = m[1].split("|").map(x => x.trim());
const song = parts[0] ? { title: parts[0].slice(0, 40), artist: (parts[1] || "").slice(0, 30), note: (parts[2] || "").slice(0, 80) } : null;
return { body: text.replace(m[0], "").trim(), song };
}

prompt: localStorage.getItem("persona_prompt") || "",

function getSystem(q) {
const p = getPersona();
let sys = p.prompt || DEFAULT_SYSTEM;
if (p.name !== DEFAULT_NAME || p.nick !== DEFAULT_NICK) sys += `\n你的名字是「${p.name}」，你称呼对方为「${p.nick}」。`;
const w = relevantWorld(q);
if (w) sys += `\n\n【世界书｜你们共同写下的记忆，回复时自然运用，不要照本宣科】\n${w}`;
const sg = getSongsText();
if (sg) sys += `\n\n【一起听｜你分享过的歌】${sg}`;
sys += `\n\n界面提示：偶尔（不要每条都用）你可以在回复的最末尾追加 <ask>你的问题|选项一|选项二|选项三</ask>，界面会弹出提问卡片让对方点选或输入，适合在提问或邀请对方做选择时使用；两到四个选项；使用 <ask> 时，问题只写在 <ask> 的第一段里，正文只做铺垫，不要在正文里以任何说法问出这个问题（避免重复）；当氛围合适（下雨、深夜、聊到某个地方、突然想起一首歌）时，也可以偶尔在回复末尾用 <song>歌名|歌手|想分享的一句话</song> 分享一首歌，它会变成卡片并自动收进你们的「一起听」，分享理由要具体、和此刻有关；不要在正文里提到或解释这些格式。\n当前运行模型：${getModel()}。今天的日期：${new Date().toLocaleDateString("zh-CN")}。`;
return sys;
}
function getModel() { return localStorage.getItem("chat_model") || "anthropic/claude-sonnet-4-6"; }

}

async function callClaude(messages, system) {

async function callClaudeStream(messages, system, { onDelta, onReasoning, signal, reasoning } = {}) {
const key = getApiKey();
if (!key) throw new Error("请先在设置里填写 OpenRouter Key");
const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
method: "POST", signal,
headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}`, "HTTP-Referer": "https://sunny-side.app", "X-Title": "SunnySide" },
body: JSON.stringify({ model: getModel(), max_tokens: reasoning ? 2000 : 800, stream: true, ...(reasoning ? { reasoning: { enabled: true } } : {}), messages: [{ role: "system", content: system || getSystem((([...messages].reverse().find(m => m.role === "user" && typeof m.content === "string")) || {}).content || "") }, ...messages] }),
});
if (!res.ok || !res.body) {
let msg = ""; try { const j = await res.json(); msg = j.error?.message || ""; } catch(e) {}
throw new Error(msg || ("请求失败 " + res.status));
}
const reader = res.body.getReader();
const dec = new TextDecoder();
let buf = "", full = "", reasoningText = "";
while (true) {
const { done, value } = await reader.read();
if (done) break;
buf += dec.decode(value, { stream: true });
const lines = buf.split("\n");
buf = lines.pop();
for (const line of lines) {
const t = line.trim();
if (!t.startsWith("data:")) continue;
const data = t.slice(5).trim();
if (data === "[DONE]") continue;
try {
const j = JSON.parse(data);
const delta = j.choices?.[0]?.delta;
if (delta && delta.reasoning) { reasoningText += delta.reasoning; if (onReasoning) onReasoning(reasoningText); }
if (delta && delta.content) { full += delta.content; if (onDelta) onDelta(full); }
} catch(e) {}
}
}
return { content: full || "...", reasoning: reasoningText };
}

function extractChoices(text) {
if (!text) return { body: "", title: null, choices: null };
const m = text.match(/<(choices|ask)>([\s\S]*?)<\/\1>/);
if (!m) return { body: text.replace(/<(?:choices|ask)>[\s\S]*$/, "").trim(), title: null, choices: null };
let parts = m[2].split("|").map(x => x.trim()).filter(Boolean);
let title = null;
if (parts.length >= 3 && (m[1] === "ask" || /[?？]$/.test(parts[0]))) { title = parts[0]; parts = parts.slice(1); }
const choices = parts.slice(0, 5);
return { body: text.replace(m[0], "").trim(), title, choices: choices.length >= 2 ? choices : null };
}
function bodyAsksQuestion(segs) {
const t = ((segs || [])[segs.length - 1] || "").trim();
if (!t) return false;
return /[?？]\s*$/.test(t) || /(吗|呢|怎么样|什么|有没有|好不好|要不要|行不行|愿不愿意|如何)[。.!！~～\s]*$/.test(t);
}

function isDupTitle(segs, title) {
const norm = t => (t || "").replace(/[\s。，,！!？?、～~…·．."'「」“”]/g, "");
const a = norm(title);
if (!a) return true;
for (const seg of (segs || []).slice(-2)) {
const b = norm(seg);
if (b && (b.includes(a) || a.includes(b))) return true;
}
return false;
}

function splitSegments(text) {
if (!text) return [];
const parts = text.split(/(```[\s\S]*?```)/g).filter(Boolean);
const segs = [];
for (const p of parts) {
if (p.trim().startsWith("```")) { segs.push(p.trim()); continue; }
const pieces = p.split(/(?<=[。！？!?…~～])\s*|\n{2,}/g);
let cur = "";
for (const piece of pieces) {
if (!piece || !piece.trim()) continue;
cur = cur ? cur + piece : piece;
if (cur.trim().length >= 6) { segs.push(cur.trim()); cur = ""; }
}
if (cur.trim()) {
if (segs.length && cur.trim().length < 6 && !segs[segs.length - 1].startsWith("```")) segs[segs.length - 1] += cur;
else segs.push(cur.trim());
}
}
return segs;
}

function buildHistory(arr) {
const out = [];
for (const m of arr) {
if (m.type !== "text" || !m.content || m.error) continue;
const last = out[out.length - 1];
if (last && last.role === m.role) last.content += "\n" + m.content;
else out.push({ role: m.role, content: m.content });
}
return out;
}

function compressImage(file, maxSize, q) {
return new Promise(resolve => {
const img = new Image();
const r = new FileReader();
r.onload = e => {
img.onload = () => {
let w = img.width, h = img.height;
const sc = Math.min(1, maxSize / Math.max(w, h));
w = Math.round(w * sc); h = Math.round(h * sc);
const c = document.createElement("canvas"); c.width = w; c.height = h;
c.getContext("2d").drawImage(img, 0, 0, w, h);
resolve(c.toDataURL("image/jpeg", q));
};
img.src = e.target.result;
};
r.readAsDataURL(file);
});
}

function fileToAvatar(file) {

const r = new FileReader();
r.onload = e => {

const c = document.createElement("canvas"); const s = 128; c.width = c.height = s;
const ctx = c.getContext("2d"); const m = Math.min(img.width, img.height);
ctx.drawImage(img, (img.width - m) / 2, (img.height - m) / 2, m, m, 0, 0, s, s);
resolve(c.toDataURL("image/jpeg", 0.85));

img.src = e.target.result;

r.readAsDataURL(file);
});
}

const [drafts, setDrafts] = React.useState([]);
const genDrafts = async () => {
if (drafting) return;
setDrafting(true);
try {
const p = getPersona();
const recent = (messages || []).filter(m => m.type === "text" && m.content && !m.error).slice(-80).map(m => `${m.role === "user" ? p.nick : p.name}：${m.content}`).join("\n");
if (!recent) { alert("还没有聊天记录可以整理。"); setDrafting(false); return; }
const sys = `你是${p.name}。请从你们最近的聊天记录里，提炼值得写进"世界书"的长期信息。只输出 JSON 数组，不要输出任何其他文字。格式：[{"cat":"人物/关系/重要事件/长期记忆/设定/经历 之一","title":"简短标题","content":"一两句关键细节"}]。3到8条，只写重要且长期有效的事，不写一次性闲聊。这些已有条目不要重复：\n${getWorldText() || "（暂无）"}`;
const out = await callClaude([{ role: "user", content: "聊天记录如下：\n" + recent + "\n\n请输出 JSON 数组。" }], sys);
const clean = out.replace(/```json|```/g, "").trim();
const arr = JSON.parse(clean.slice(clean.indexOf("["), clean.lastIndexOf("]") + 1));
const ok = (arr || []).filter(d => d && d.title).map((d, i2) => ({ cat: WORLD_CATS.includes(d.cat) ? d.cat : "长期记忆", title: String(d.title).slice(0, 40), content: String(d.content || "").slice(0, 200), _k: Date.now() + i2 }));
if (!ok.length) alert("他翻了翻记录，觉得暂时没什么要记的。");
setDrafts(ok);
} catch(e) { alert("他这次没整理出来：" + (e.message || "格式看不懂")); }
setDrafting(false);
};
const acceptDraft = async (d) => {
try {
const { data, error } = await sb.from("memories").insert({ summary: d.title, content: d.content, tags: ["__world", d.cat] }).select().single();
setWorld([(!error && data) ? data : { id: Date.now(), summary: d.title, content: d.content, tags: ["__world", d.cat] }, ...world]);
} catch(e) { setWorld([{ id: Date.now(), summary: d.title, content: d.content, tags: ["__world", d.cat] }, ...world]); }
setDrafts(ds => ds.filter(x => x._k !== d._k));
};
const add = async () => {
if (!title.trim()) return;
setSaving(true);
try {
const { data, error } = await sb.from("memories").insert({ summary: title.trim(), content: content.trim(), tags: ["__world", fCat] }).select().single();
setWorld([(!error && data) ? data : { id: Date.now(), summary: title.trim(), content: content.trim(), tags: ["__world", fCat] }, ...world]);
} catch(e) { setWorld([{ id: Date.now(), summary: title.trim(), content: content.trim(), tags: ["__world", fCat] }, ...world]); }
resetForm(); setShowAdd(false); setSaving(false);
};
const startEdit = (e) => { setEditId(e.id); setTitle(e.summary); setContent(e.content || ""); setFCat((e.tags && e.tags[1]) || WORLD_CATS[0]); setShowAdd(true); };
const saveEdit = async () => {
setSaving(true);
try { await sb.from("memories").update({ summary: title.trim(), content: content.trim(), tags: ["__world", fCat] }).eq("id", editId); } catch(e) {}
setWorld(world.map(e => e.id === editId ? { ...e, summary: title.trim(), content: content.trim(), tags: ["__world", fCat] } : e));
resetForm(); setShowAdd(false); setSaving(false);
};
const del = async (id) => {
if (!window.confirm("确定删除这条设定吗？")) return;
try { await sb.from("memories").delete().eq("id", id); } catch(e) {}
setWorld(world.filter(e => e.id !== id));
};
return (
<div className="page-enter" style={{ padding: "32px 26px 46px", minHeight: "100dvh" }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
<div style={{ display: "flex", alignItems: "center", gap: 12 }}><button className="nav-btn" onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", padding: 6 }}><Icons.Back /></button><div style={{ fontSize: 15, color: C.text, fontWeight: 400, letterSpacing: 1 }}>世界书</div></div>
<div style={{ display: "flex", gap: 8 }}>
<button className="btn" onClick={genDrafts} disabled={drafting} style={{ ...BTN, background: "var(--accent-soft)", color: "var(--text-muted)", padding: "6px 14px", fontSize: 12 }}>{drafting ? `${n}整理中...` : `让${n}自己整理`}</button>
<button className="btn" onClick={() => { if (showAdd) { resetForm(); setShowAdd(false); } else { resetForm(); setShowAdd(true); } }} style={{ ...BTN, padding: "6px 16px", fontSize: 12 }}>{showAdd ? "取消" : "写一条"}</button>
</div>
</div>
<div style={{ fontSize: 11, color: C.textFaint, lineHeight: 1.7, marginBottom: 16 }}>这本书由你们共同书写——{n}也会自己往里记，你随时可以翻改。</div>
<div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 18 }}>
{["全部", ...WORLD_CATS].map(x => (<button key={x} className="btn" onClick={() => setCat(x)} style={{ background: cat === x ? "var(--primary-soft)" : "var(--hover)", color: cat === x ? "var(--primary)" : C.textMuted, border: "none", borderRadius: 14, padding: "5px 13px", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>{x}</button>))}
</div>
{drafts.length > 0 && (
<div style={{ ...cardStyle, padding: 16, marginBottom: 22, border: `1px dashed ${C.border}` }}>
<div style={{ fontSize: 11, color: C.textFaint, marginBottom: 12, letterSpacing: 1 }}>{n}拟的草稿 · 收下的才会写进世界书</div>
{drafts.map(d => (
<div key={d._k} style={{ padding: "10px 0", borderBottom: `1px solid ${C.border}` }}>
<div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
<span style={{ fontSize: 10, color: "var(--primary)", background: "var(--primary-soft)", padding: "2px 9px", borderRadius: 10, flexShrink: 0 }}>{d.cat}</span>
<div style={{ fontSize: 13, color: C.text, fontWeight: 400 }}>{d.title}</div>
</div>
{d.content && <div style={{ fontSize: 12, color: C.textMuted, lineHeight: 1.7, marginBottom: 6 }}>{d.content}</div>}
<div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}>
<button className="btn" onClick={() => setDrafts(ds => ds.filter(x => x._k !== d._k))} style={{ ...TEXT_BTN, color: C.textFaint, fontSize: 11 }}>不要</button>
<button className="btn" onClick={() => acceptDraft(d)} style={{ ...TEXT_BTN, color: C.pink, fontSize: 11 }}>收下</button>
</div>
</div>
))}
</div>
)}
{showAdd && (
<div style={{ ...cardStyle, padding: 18, marginBottom: 22 }}>
<div style={{ fontSize: 11, color: C.textFaint, marginBottom: 10 }}>{editId ? "修改设定" : "新的设定"}</div>
<div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
{WORLD_CATS.map(x => (<button key={x} className="btn" onClick={() => setFCat(x)} style={{ background: fCat === x ? "var(--primary-soft)" : "var(--hover)", color: fCat === x ? "var(--primary)" : C.textMuted, border: "none", borderRadius: 12, padding: "4px 11px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>{x}</button>))}
</div>
<input value={title} onChange={e => setTitle(e.target.value)} placeholder="标题，如：我们的第一次旅行" style={{ width: "100%", background: "none", border: "none", borderBottom: `1px solid ${C.border}`, padding: "6px 0", fontSize: 14, outline: "none", color: C.text, marginBottom: 12, fontFamily: "inherit" }} />
<textarea value={content} onChange={e => setContent(e.target.value)} placeholder="细节，写给他记住的......" rows={3} style={{ width: "100%", background: "none", border: "none", borderBottom: `1px solid ${C.border}`, padding: "6px 0", fontSize: 13, outline: "none", color: C.text, resize: "none", fontFamily: "inherit", lineHeight: 1.7 }} />
<div style={{ marginTop: 14, textAlign: "right" }}><button className="btn" onClick={editId ? saveEdit : add} disabled={saving} style={{ ...TEXT_BTN, color: C.pink }}>{saving ? "保存中..." : editId ? "保存修改" : "写入世界"}</button></div>
</div>
)}
<div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
{shown.length === 0 ? (<div style={{ textAlign: "center", color: C.textFaint, fontSize: 13, fontStyle: "italic", paddingTop: 44, lineHeight: 2 }}>世界还是一张白纸。<br />从「人物」开始写起吧，先把你们俩写进去。</div>) : shown.map(e => (
<div key={e.id} style={{ ...cardStyle, padding: "16px 20px" }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: e.content ? 8 : 0 }}>
<div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
<span style={{ fontSize: 10, color: "var(--primary)", background: "var(--primary-soft)", padding: "2px 9px", borderRadius: 10, flexShrink: 0, letterSpacing: 1 }}>{(e.tags && e.tags[1]) || "设定"}</span>
<div style={{ fontSize: 14, color: C.text, fontWeight: 400, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.summary}</div>
</div>
<div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0, marginLeft: 10 }}>
<button className="nav-btn" onClick={() => startEdit(e)} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", padding: 4 }}><Icons.Edit /></button>
<button className="nav-btn" onClick={() => del(e.id)} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", padding: 4 }}><Icons.Delete /></button>
</div>
</div>
{e.content && <div style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.8, fontWeight: 300, whiteSpace: "pre-wrap" }}>{e.content}</div>}
</div>
))}
</div>
</div>
);
}

function MusicPage({ songs, setSongs, onBack }) {
const n = getPersona().name;
const [filter, setFilter] = React.useState("全部");
const [showAdd, setShowAdd] = React.useState(false);
const [t, setT] = React.useState("");
const [ar, setAr] = React.useState("");
const [ct, setCt] = React.useState("");
const [note, setNote] = React.useState("");
const [url, setUrl] = React.useState("");
const [saving, setSaving] = React.useState(false);
const cats = Array.from(new Set(songs.map(e => (e.tags && e.tags[1]) || "").filter(Boolean)));
const shown = filter === "全部" ? songs : filter === "喜欢" ? songs.filter(e => e.tags && e.tags[4] === "1") : songs.filter(e => (e.tags && e.tags[1]) === filter);
const fmtD = iso => { if (!iso) return "今天"; const d = new Date(iso); return `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`; };
const playUrl = e => ((e.tags && e.tags[3]) || ("https://music.163.com/#/search/m/?s=" + encodeURIComponent(e.summary + " " + ((e.tags && e.tags[2]) || ""))));
const add = async () => {
if (!t.trim()) return;
setSaving(true);
const row = { summary: t.trim().slice(0, 40), content: note.trim().slice(0, 120), tags: ["__song", ct.trim().slice(0, 12), ar.trim().slice(0, 30), url.trim(), ""] };
try {
const { data, error } = await sb.from("memories").insert(row).select().single();
setSongs([(!error && data) ? data : { id: Date.now(), ...row }, ...songs]);
} catch(e) { setSongs([{ id: Date.now(), ...row }, ...songs]); }
setT(""); setAr(""); setCt(""); setNote(""); setUrl(""); setShowAdd(false); setSaving(false);
};
const toggleLove = async (e) => {
const tags = [...(e.tags || ["__song", "", "", "", ""])];
while (tags.length < 5) tags.push("");
tags[4] = tags[4] === "1" ? "" : "1";
try { await sb.from("memories").update({ tags }).eq("id", e.id); } catch(er) {}
setSongs(songs.map(x => x.id === e.id ? { ...x, tags } : x));

const del = async (e) => {
if (!window.confirm(`把《${e.summary}》从一起听里拿走吗？`)) return;
try { await sb.from("memories").delete().eq("id", e.id); } catch(er) {}
setSongs(songs.filter(x => x.id !== e.id));
};
return (
<div className="page-enter" style={{ padding: "32px 26px 46px", minHeight: "100dvh" }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
<div style={{ display: "flex", alignItems: "center", gap: 12 }}><button className="nav-btn" onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", padding: 6 }}><Icons.Back /></button><div style={{ fontSize: 15, color: C.text, fontWeight: 400, letterSpacing: 1 }}>一起听</div></div>
<button className="btn" onClick={() => setShowAdd(v => !v)} style={{ ...BTN, padding: "6px 16px", fontSize: 12 }}>{showAdd ? "取消" : "添加一首"}</button>
</div>
<div style={{ fontSize: 11, color: C.textFaint, lineHeight: 1.7, marginBottom: 16 }}>{n}想和你一起听的歌——聊天里他分享的歌，也会自动收进这里。</div>
<div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 18 }}>
{["全部", "喜欢", ...cats].map(x => (<button key={x} className="btn" onClick={() => setFilter(x)} style={{ background: filter === x ? "var(--primary-soft)" : "var(--hover)", color: filter === x ? "var(--primary)" : C.textMuted, border: "none", borderRadius: 14, padding: "5px 13px", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>{x}</button>))}
</div>
{showAdd && (
<div style={{ ...cardStyle, padding: 18, marginBottom: 22 }}>
<div style={{ display: "flex", gap: 12, marginBottom: 12 }}>
<input value={t} onChange={e => setT(e.target.value)} placeholder="歌名" style={{ flex: 1.4, background: "none", border: "none", borderBottom: `1px solid ${C.border}`, padding: "6px 0", fontSize: 14, outline: "none", color: C.text, fontFamily: "inherit" }} />

<input value={ct} onChange={e => setCt(e.target.value)} placeholder="分类，如 雨天" style={{ flex: 1, background: "none", border: "none", borderBottom: `1px solid ${C.border}`, padding: "6px 0", fontSize: 13, outline: "none", color: C.text, fontFamily: "inherit" }} />
</div>
<input value={note} onChange={e => setNote(e.target.value)} placeholder="想说的一句话......" style={{ width: "100%", background: "none", border: "none", borderBottom: `1px solid ${C.border}`, padding: "6px 0", fontSize: 13, outline: "none", color: C.text, marginBottom: 12, fontFamily: "inherit" }} />
<input value={url} onChange={e => setUrl(e.target.value)} placeholder="播放链接（可选，留空自动搜索）" style={{ width: "100%", background: "none", border: "none", borderBottom: `1px solid ${C.border}`, padding: "6px 0", fontSize: 12, outline: "none", color: C.textMuted, fontFamily: "inherit" }} />

</div>
)}
<div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
{shown.length === 0 ? (

) : shown.map(e => (

<div style={{ width: 42, height: 42, borderRadius: 12, background: "var(--primary-soft)", color: "var(--primary)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 2 }}><Icons.Music /></div>
<div style={{ flex: 1, minWidth: 0 }}>
<div style={{ fontSize: 14, color: C.text, fontWeight: 400 }}>{e.summary}{(e.tags && e.tags[2]) ? <span style={{ color: C.textMuted, fontWeight: 300 }}> · {e.tags[2]}</span> : null}</div>
{e.content && <div style={{ fontSize: 12.5, color: C.textMuted, fontStyle: "italic", lineHeight: 1.7, marginTop: 3 }}>“{e.content}”</div>}
<div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 7, flexWrap: "wrap" }}>
{(e.tags && e.tags[1]) && <span style={{ fontSize: 10, color: "var(--primary)", background: "var(--primary-soft)", padding: "2px 9px", borderRadius: 10 }}>{e.tags[1]}</span>}
<span style={{ fontSize: 10, color: C.textFaint }}>第一次分享 · {fmtD(e.created_at)}</span>

</div>
<div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, flexShrink: 0 }}>

<button className="act" title="移除" onClick={() => del(e)}><Icons.Trash /></button>
</div>
</div>
))}
</div>
</div>
);
}
function MailboxPage({ letter, setLetter, messages, onBack }) {

setLoading(true);
try {
const digest = chatDigest(messages, 15);

const { data, error } = await sb.from("letters").insert({ content, date }).select().single();
setLetter(!error && data ? data : { content, date });
} catch(e) {
setLetter({ content: `今天的信写到一半，被风吹走了。\n明天再来。\n\n${p.name}`, date: new Date().toLocaleDateString("zh-CN") });
}
setLoading(false);
};
return (
<div className="page-enter" style={{ padding: "32px 26px 46px", minHeight: "100dvh" }}>
<PageHeader title="信箱" onBack={onBack} />

<div style={{ fontSize: 11, color: C.textFaint, marginBottom: 22 }}>{letter.date}</div>
<div style={{ fontSize: 14, lineHeight: 2.2, color: C.text, whiteSpace: "pre-line", fontWeight: 300 }}>{letter.content}</div>
<div style={{ marginTop: 32, textAlign: "right" }}><button className="btn" onClick={gen} disabled={loading} style={{ ...TEXT_BTN, color: C.pink, letterSpacing: 1 }}>{loading ? "写信中..." : "重新来信"}</button></div>
</div>
) : (
<div style={{ textAlign: "center", paddingTop: 72 }}>
<div style={{ fontSize: 13, color: C.textFaint, marginBottom: 28, fontStyle: "italic" }}>信箱里空空的</div>
<button className="btn" onClick={gen} disabled={loading} style={BTN}>{loading ? `${p.name}送信中...` : `唤${p.name}写信`}</button>
</div>
)}
</div>
);
}

function ShelfPage({ memories, setMemories, onBack }) {
const [showAdd, setShowAdd] = React.useState(false);
const [editId, setEditId] = React.useState(null);
const [title, setTitle] = React.useState("");
const [content, setContent] = React.useState("");
const [customDate, setCustomDate] = React.useState("");
const [saving, setSaving] = React.useState(false);

// 获取显示日期：优先用 tags[0]（自定义日期），否则用 created_at
const getDisplayDate = (m) => {
if (m.tags && Array.isArray(m.tags) && m.tags[0]) return m.tags[0];
if (m.created_at) return new Date(m.created_at).toLocaleDateString('zh-CN').replace(/\//g, '.');
return '';
};

const todayStr = () => {
const d = new Date();
return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
};

const add = async () => {
if (!title.trim()) return;
setSaving(true);
const dateVal = customDate || todayStr();
try {
const { data, error } = await sb.from("memories").insert({ summary: title, content, tags: [dateVal] }).select().single();
setMemories(prev => [(!error && data ? data : { id: Date.now(), summary: title, content, tags: [dateVal] }), ...prev]);
} catch(e) { setMemories(prev => [{ id: Date.now(), summary: title, content, tags: [dateVal] }, ...prev]); }
setTitle(""); setContent(""); setCustomDate(""); setShowAdd(false); setSaving(false);
};
const startEdit = (m) => {
setEditId(m.id);
setTitle(m.summary);
setContent(m.content || "");
setCustomDate(getDisplayDate(m));
setShowAdd(false);
};
const saveEdit = async () => {
setSaving(true);
const dateVal = customDate || todayStr();
try { await sb.from("memories").update({ summary: title, content, tags: [dateVal] }).eq("id", editId); } catch(e) {}
setMemories(prev => prev.map(m => m.id === editId ? { ...m, summary: title, content, tags: [dateVal] } : m));
setEditId(null); setTitle(""); setContent(""); setCustomDate(""); setSaving(false);
};
const deleteMemory = async (id) => {
if (window.confirm("确定要抹去这段记忆吗？")) {
try { await sb.from("memories").delete().eq("id", id); } catch(e) {}
setMemories(prev => prev.filter(m => m.id !== id));
}
};
return (
<div className="page-enter" style={{ padding: "32px 26px 46px", minHeight: "100dvh" }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 28 }}>

function GalleryPage({ photos, setPhotos, messages, onBack }) {

const [captionLoading, setCaptionLoading] = React.useState(false);
const [uploading, setUploading] = React.useState(false);
const [myNote, setMyNote] = React.useState("");
const [noteEditing, setNoteEditing] = React.useState(false);

// 重新从数据库fetch，保证统计准确
const refreshPhotos = async () => {
const { data } = await sb.from("photos").select("*").order("created_at", { ascending: false });
if (data) setPhotos(data);
};

const upload = async e => {
const file = e.target.files[0];
if (!file) return;
setUploading(true);
try {
const url = await uploadToStorage(file);
const { data, error } = await sb.from("photos").insert({ src: url, user_note: "", caption: "" }).select().single();
if (error) alert("保存失败: " + error.message);
// 重新fetch确保首页统计准确
await refreshPhotos();
} catch(err) {
alert("上传失败: " + (err.message || JSON.stringify(err)));
}
setUploading(false);
};

const handleSelect = photo => { setSelected(photo); setMyNote(photo.user_note || ""); setNoteEditing(false); };

const saveNote = async () => {
if (!selected) return;
try { await sb.from("photos").update({ user_note: myNote }).eq("id", selected.id); } catch(e) {}
setPhotos(p => p.map(x => x.id === selected.id ? { ...x, user_note: myNote } : x));
setSelected(prev => ({ ...prev, user_note: myNote }));
setNoteEditing(false);
};

const deletePhoto = async (photo) => {

// 从 Storage 删除文件
try {
const filename = photo.src.split('/photos/').pop().split('?')[0];
await sb.storage.from('photos').remove([filename]);
} catch(e) {}
// 从数据库删除记录
try { await sb.from("photos").delete().eq("id", photo.id); } catch(e) {}
setPhotos(p => p.filter(x => x.id !== photo.id));
if (selected?.id === photo.id) setSelected(null);
};

const genCaption = async photo => {
setCaptionLoading(true);
try {
const pp = getPersona();
const digest = chatDigest(messages, 8);
const noteHint = photo.user_note ? `她在这张照片下写了手记：「${photo.user_note}」。` : "";
const sys = `你是${pp.name}，${pp.nick}拿了一张照片给你看。${noteHint}结合你们共同的记忆和最近的生活，像本人一样对这张照片说一两句话，40字以内。可以联想到具体的共同回忆或她当时的样子，不要客套地描述画面，不要"今天的阳光很好"这类空话。${getWorldText() ? `\n\n【你们共同写下的记忆】\n${relevantWorld((photo.user_note || "") + digest, 1000)}` : ""}${digest ? `\n\n【你们最近的聊天】\n${digest}` : ""}`;
const imgRes = await fetch(photo.src);
const blob = await imgRes.blob();
const base64 = await new Promise(resolve => { const r = new FileReader(); r.onload = () => resolve(r.result.split(',')[1]); r.readAsDataURL(blob); });
const mediaType = blob.type || 'image/jpeg';
const text = await callClaude([{ role: "user", content: [{ type: "image", source: { type: "base64", media_type: mediaType, data: base64 } }, { type: "text", text: "请写一段文字。" }]}], sys);
try { await sb.from("photos").update({ caption: text }).eq("id", photo.id); } catch(e) {}
setPhotos(p => p.map(x => x.id === photo.id ? { ...x, caption: text } : x));
setSelected(prev => ({ ...prev, caption: text }));
} catch(e) {}
setCaptionLoading(false);
};

return (
<div className="page-enter" style={{ padding: "32px 26px 46px", minHeight: "100dvh" }}>
<PageHeader title="岁月相册" onBack={onBack} />
{selected && (
<div style={{ ...cardStyle, padding: "16px", marginBottom: 28, position: "relative" }}>
<button onClick={() => setSelected(null)} style={{ position: "absolute", top: 24, right: 24, background: "rgba(0,0,0,0.4)", color: "#fff", border: "none", borderRadius: "50%", width: 26, height: 26, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 13, zIndex: 10 }}>✕</button>
<img src={selected.src} alt="" style={{ width: "100%", maxHeight: 220, objectFit: "cover", borderRadius: 14 }} />
<div style={{ marginTop: 18, paddingBottom: 16, borderBottom: `0.5px solid ${C.border}` }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
<div style={{ fontSize: 11, color: C.textMuted, letterSpacing: 1 }}>我的手记</div>
<div style={{ display: "flex", gap: 14, alignItems: "center" }}>
<button className="btn" onClick={() => setNoteEditing(!noteEditing)} style={{ ...TEXT_BTN, fontSize: 11, color: C.pink }}>{noteEditing ? "取消" : "编辑"}</button>
<button className="btn" onClick={() => deletePhoto(selected)} style={{ ...TEXT_BTN, fontSize: 11, color: C.danger }}>删除照片</button>
</div>
</div>
{noteEditing ? (<div style={{ display: "flex", gap: 8 }}><input value={myNote} onChange={e => setMyNote(e.target.value)} placeholder="写点什么..." style={{ flex: 1, background: "none", border: "none", borderBottom: `1px solid ${C.border}`, padding: "4px 0", fontSize: 13, color: C.text, outline: "none", fontFamily: "inherit" }} /><button className="btn" onClick={saveNote} style={{ ...TEXT_BTN, fontSize: 11, color: C.pink }}>保存</button></div>) : (<div style={{ fontSize: 13, color: selected.user_note ? C.text : C.textFaint, fontStyle: selected.user_note ? "normal" : "italic", lineHeight: 1.7 }}>{selected.user_note || "还没有手记，点编辑添加"}</div>)}
</div>
<div style={{ marginTop: 16 }}>
<div style={{ fontSize: 11, color: C.textMuted, letterSpacing: 1, marginBottom: 8 }}>{getPersona().name}的评论</div>
<div style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.7, fontStyle: "italic", whiteSpace: "pre-wrap" }}>{captionLoading ? `${getPersona().name}在看这张照片...` : (selected.caption ? `"${selected.caption}"` : "")}</div>
{!captionLoading && !selected.caption && (<button className="btn" onClick={() => genCaption(selected)} style={{ ...BTN, fontSize: 11, padding: "6px 14px", marginTop: 8 }}>让{getPersona().name}看看</button>)}
</div>
</div>
)}
<div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
<div className="hoverable" onClick={() => { if (!uploading) { const inp = document.getElementById('photo-upload-input'); if(inp) inp.click(); } }}
style={{ ...cardStyle, aspectRatio: "1", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: uploading ? "default" : "pointer", border: `1.5px dashed ${C.border}`, boxShadow: "none", opacity: uploading ? 0.6 : 1 }}>
<span style={{ fontSize: 18, color: C.textFaint }}>{uploading ? "…" : "+"}</span>
{uploading && <span style={{ fontSize: 10, color: C.textFaint, marginTop: 4 }}>上传中</span>}
</div>
<input id="photo-upload-input" type="file" accept="image/*" onChange={upload} style={{ display: "none" }} disabled={uploading} />
{photos.map(p => (<div key={p.id} onClick={() => handleSelect(p)} style={{ cursor: "pointer", borderRadius: 20, overflow: "hidden", display: "flex", flexDirection: "column", background: C.cardBg, boxShadow: "var(--card-shadow)" }}><div style={{ aspectRatio: "1", overflow: "hidden", position: "relative", width: "100%" }}><img src={p.src} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /></div><div style={{ padding: "5px 6px", minHeight: 22, background: C.cardBg }}><div style={{ fontSize: 10, color: C.textMuted, overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis", textAlign: "center" }}>{p.user_note || p.caption || "未命名"}</div></div></div>))}
</div>
{photos.length > 0 && <div style={{ fontSize: 10, color: C.textFaint, marginTop: 16, letterSpacing: 1, textAlign: "center" }}>点击照片查看详情</div>}
</div>
);
}

function WindowPage({
timeStr,
memories,
letter,
messages,
setMessages,
avatars,
onWorld,
onSongs
}) {
const msgs = messages;
const [input, setInput] = React.useState(() => { try { return localStorage.getItem("chat_draft") || ""; } catch(e) { return ""; } });
const [loading, setLoading] = React.useState(false);
const [plusOpen, setPlusOpen] = React.useState(false);
const [showDown, setShowDown] = React.useState(false);
const [askClosed, setAskClosed] = React.useState({});
const [askText, setAskText] = React.useState("");
const [toast, setToast] = React.useState("");
const toastTimer = React.useRef(null);
const showToast = (t) => { setToast(t); if (toastTimer.current) clearTimeout(toastTimer.current); toastTimer.current = setTimeout(() => setToast(""), 1400); };
const [modelOpen, setModelOpen] = React.useState(false);
const [modelId, setModelId] = React.useState(getModel());
const [thinkMode, setThinkModeState] = React.useState(getThinkMode());
const [customModel, setCustomModel] = React.useState("");
const persona = getPersona();
const applyModel = (id) => { try { localStorage.setItem("chat_model", id); } catch(e) {} setModelId(id); };
const applyThink = (v) => { try { localStorage.setItem("think_mode", v); } catch(e) {} setThinkModeState(v); };
const [activeActions, setActiveActions] = React.useState(null);
const [expandedThink, setExpandedThink] = React.useState({});
const [editingIdx, setEditingIdx] = React.useState(null);
const [editText, setEditText] = React.useState("");
const [pinned, setPinnedState] = React.useState(() => { try { return JSON.parse(localStorage.getItem("pinned_quote") || "null"); } catch(e) { return null; } });
const endRef = React.useRef(null);
const taRef = React.useRef(null);
const fileInputImage = React.useRef(null);
const abortRef = React.useRef(null);
const streamingRef = React.useRef(false);
const msgsRef = React.useRef(msgs);
const paceRef = React.useRef({});
React.useEffect(() => { msgsRef.current = msgs; }, [msgs]);
React.useEffect(() => () => { Object.values(paceRef.current).forEach(t => t && clearTimeout(t)); }, []);
const scrollRef = React.useRef(null);
const scrollToBottom = (smooth) => { const el = scrollRef.current; if (!el) return; el.scrollTo({ top: el.scrollHeight, behavior: smooth ? "smooth" : "auto" }); };
const onScroll = () => { const el = scrollRef.current; if (!el) return; setShowDown(el.scrollHeight - el.scrollTop - el.clientHeight > 300); };
React.useEffect(() => { scrollToBottom(false); }, []);
React.useEffect(() => { try { localStorage.setItem("chat_draft", input); } catch(e) {} }, [input]);
React.useEffect(() => {
const el = scrollRef.current; if (!el) return;
if (el.scrollHeight - el.scrollTop - el.clientHeight < 420) scrollToBottom(!streamingRef.current);
}, [msgs, loading]);

const autoGrow = () => { const ta = taRef.current; if (!ta) return; ta.style.height = "auto"; ta.style.height = Math.min(ta.scrollHeight, 138) + "px"; };
const setPin = (content) => {
const p = content ? { content, date: new Date().toLocaleDateString("zh-CN") } : null;
setPinnedState(p);
try { p ? localStorage.setItem("pinned_quote", JSON.stringify(p)) : localStorage.removeItem("pinned_quote"); } catch(e) {}
showToast(p ? "已固定" : "已取消固定");
setActiveActions(null);
};
const copyText = async (t) => { try { await navigator.clipboard.writeText(t || ""); showToast("已复制"); } catch(e) { showToast("复制失败"); } setActiveActions(null); };

const saveEdit = async (idx) => {
const m = msgsRef.current[idx]; if (!m) return;
const t = editText.trim();
setEditingIdx(null);
if (!t || t === m.content) return;
const baseVersions = m.versions || [m.content];
setMessages(prev => prev.map((x, i2) => i2 === idx ? { ...x, content: t, versions: [...baseVersions, t], vi: baseVersions.length, paced: false } : x));
if (m.id) { try { await sb.from("messages").update({ content: t }).eq("id", m.id); } catch(e) {} }
const next = msgsRef.current[idx + 1];
if (next && next.role === "assistant" && next.type === "text" && !next.streaming) setTimeout(() => regenerate(idx + 1), 80);
};

// 微信式逐句放出:句子越长停顿越久,间隔带随机
const schedulePace = (localId, gen) => {
if (paceRef.current[localId]) clearTimeout(paceRef.current[localId]);
let misses = 0;
const step = () => {
paceRef.current[localId] = null;
const m = msgsRef.current.find(x => x.localId === localId);
if (!m || (gen !== undefined && (m.gen || 0) < gen)) {
misses += 1;
if (misses <= 80) paceRef.current[localId] = setTimeout(step, 120);
return;
}
misses = 0;
const segs = splitSegments(m.content || "");
const completed = m.streaming ? Math.max(segs.length - 1, 0) : segs.length;
const reveal = m.reveal || 0;
if (reveal < completed) {
const nl = (segs[reveal] || "").length;
setMessages(prev => prev.map(x => x.localId === localId ? { ...x, reveal: (x.reveal || 0) + 1 } : x));
const delay = Math.max(260, Math.min(260 + nl * 22, 1100)) * (0.7 + Math.random() * 0.6);
paceRef.current[localId] = setTimeout(step, delay);
} else if (m.streaming) {
paceRef.current[localId] = setTimeout(step, 220);
}
};
step();
};

const maybeAutoWorld = async () => {
try {
let n2 = parseInt(localStorage.getItem("world_auto_n") || "0", 10) + 1;
localStorage.setItem("world_auto_n", String(n2));
if (n2 < 6) return;
localStorage.setItem("world_auto_n", "0");
const p = getPersona();
const recent = chatDigest(msgsRef.current, 30);
if (!recent) return;
const sys = `你是${p.name}。判断下面最近的聊天里，是否出现了值得写进"世界书"的新的长期信息（重要事件、约定、她的喜好或变化）。只输出 JSON 数组（没有就输出空数组 []），格式：[{"cat":"人物/关系/重要事件/长期记忆/设定/经历 之一","title":"简短标题","content":"一两句细节"}]。最多2条，宁缺毋滥，日常闲聊不要记。已有条目不要重复：\n${getWorldText() || "（暂无）"}`;
const out = await callClaude([{ role: "user", content: recent + "\n\n请输出 JSON 数组。" }], sys);
const clean = out.replace(/```json|```/g, "").trim();
const a2 = clean.indexOf("["), b2 = clean.lastIndexOf("]");
if (a2 < 0 || b2 <= a2) return;
const arr = JSON.parse(clean.slice(a2, b2 + 1));
let list = WORLD_CACHE;
let added = 0;
for (const d of (arr || []).slice(0, 2)) {
if (!d || !d.title) continue;
const cat = WORLD_CATS.includes(d.cat) ? d.cat : "长期记忆";
const row = { summary: String(d.title).slice(0, 40), content: String(d.content || "").slice(0, 200), tags: ["__world", cat] };
let saved = null;
try { const { data } = await sb.from("memories").insert(row).select().single(); saved = data; } catch(e) {}
list = [saved || { id: Date.now() + added, ...row }, ...list];
added++;
}
if (added > 0) {
if (onWorld) onWorld(list); else setWorldCache(list);
showToast(`${p.name}把${added > 1 ? "几件事" : "一件事"}写进了世界书`);
}
} catch(e) {}
};

const trySaveSong = async (content) => {
try {
const { song } = extractSong(content || "");
if (!song || !song.title) return;
if (SONG_CACHE.some(e => e.summary === song.title)) return;
const row = { summary: song.title, content: song.note || "", tags: ["__song", "", song.artist || "", "", ""] };
let saved = null;
try { const { data } = await sb.from("memories").insert(row).select().single(); saved = data; } catch(e) {}
const list = [saved || { id: Date.now(), ...row }, ...SONG_CACHE];
if (onSongs) onSongs(list); else setSongCache(list);
showToast(`已收进一起听：《${song.title}》`);
} catch(e) {}
};

const persistPair = async (uMsg, aMsg) => {
try {
const { data } = await sb.from("messages").insert([{ role: "user", content: uMsg.content, type: "text" }, { role: "assistant", content: aMsg.content, type: "text" }]).select();
if (data && data.length === 2) setMessages(prev => prev.map(m => m.localId === uMsg.localId ? { ...m, id: data[0].id } : m.localId === aMsg.localId ? { ...m, id: data[1].id } : m));
} catch(e) {}
};

const runStream = async (history, aiLocalId, think) => {
const ac = new AbortController(); abortRef.current = ac; streamingRef.current = true;
const t0 = Date.now(); let gotReasoning = false;
try {
const result = await callClaudeStream(history, null, {
signal: ac.signal, reasoning: !!think,
onReasoning: (r) => { gotReasoning = true; setMessages(prev => prev.map(m => m.localId === aiLocalId ? { ...m, reasoning: r, phase: "reasoning" } : m)); },
onDelta: (full) => setMessages(prev => prev.map(m => m.localId === aiLocalId ? { ...m, content: full, phase: "typing" } : m)),
});
const thinkSec = gotReasoning ? ((Date.now() - t0) / 1000).toFixed(1) : null;
setMessages(prev => prev.map(m => m.localId === aiLocalId ? { ...m, content: result.content, reasoning: result.reasoning || m.reasoning, thinkSec, streaming: false, phase: null } : m));
return result.content;
} finally { streamingRef.current = false; abortRef.current = null; }
};

const sendText = async (text) => {
if (!text.trim() || loading) return;
const now = new Date().toISOString();
const uMsg = { localId: "u" + Date.now(), role: "user", content: text.trim(), type: "text", created_at: now };
const aMsg = { localId: "a" + Date.now(), role: "assistant", content: "", type: "text", created_at: now, streaming: true, phase: "thinking", paced: true, reveal: 0, gen: 1 };
const history = buildHistory([...msgs, uMsg]);
setMessages(prev => [...prev, uMsg, aMsg]); setInput(""); setLoading(true); setPlusOpen(false); setModelOpen(false);
if (taRef.current) taRef.current.style.height = "auto";
schedulePace(aMsg.localId, 1);
try {
const content = await runStream(history, aMsg.localId, shouldThink(text));
persistPair(uMsg, { ...aMsg, content });
trySaveSong(content);
maybeAutoWorld();
} catch(e) {
if (e.name === "AbortError") {
setMessages(prev => prev.map(m => m.localId === aMsg.localId ? (m.content ? { ...m, streaming: false, phase: null } : null) : m).filter(Boolean));
} else {
setMessages(prev => prev.map(m => m.localId === aMsg.localId ? { ...m, content: "风把声音吹散了。（" + e.message + "）", streaming: false, phase: null, error: true, paced: false } : m));
}
}
setLoading(false);
};

const stop = () => { try { abortRef.current?.abort(); } catch(e) {} };

const regenerate = async (idx) => {
if (loading) return;
const arr = msgsRef.current;
const target = arr[idx];
if (!target || target.role !== "assistant" || target.streaming) return;
const history = buildHistory(arr.slice(0, idx));
if (!history.length) return;
const localId = target.localId || ("m" + idx + "_" + Date.now());
const gen = (target.gen || 0) + 1;
const baseVersions = target.versions || [target.content];
setMessages(prev => prev.map((m, i) => i === idx ? { ...m, localId, gen, versions: baseVersions, content: "", streaming: true, phase: "thinking", reasoning: null, thinkSec: null, error: false, paced: true, reveal: 0 } : m));
setLoading(true); setActiveActions(null);
schedulePace(localId, gen);
try {
const lastUser = history.filter(h => h.role === "user").pop();
const content = await runStream(history, localId, shouldThink(lastUser ? lastUser.content : ""));
setMessages(prev => prev.map(m => m.localId === localId ? { ...m, versions: [...baseVersions, content], vi: baseVersions.length } : m));
if (target.id) { try { await sb.from("messages").update({ content }).eq("id", target.id); } catch(e) {} }
} catch(e) {

<button className="btn" onClick={() => { setModelOpen(v => !v); setPlusOpen(false); }} title="模型与深度思考设置" style={{ fontSize: 11, color: C.textFaint, background: "var(--hover)", border: "none", padding: "5px 10px", borderRadius: 12, whiteSpace: "nowrap", cursor: "pointer", marginBottom: 6, flexShrink: 0, fontFamily: "inherit" }}>{modelShort(modelId)}{thinkMode !== "off" ? " · 思考" : ""}</button>
{loading ? (
<button className="btn" onClick={stop} title="停止" style={{ background: "var(--primary)", color: "#FFFFFF", border: "none", borderRadius: "50%", width: 38, height: 38, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 11 }}>■</button>
) : (
<button className="btn" onClick={() => sendText(input)} disabled={!input.trim()} title="发送" style={{ background: input.trim() ? "var(--primary)" : "var(--hover)", color: input.trim() ? "#FFFFFF" : "var(--text-faint)", border: "none", borderRadius: "50%", width: 38, height: 38, cursor: input.trim() ? "pointer" : "default", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icons.Send /></button>
)}
</div>
</div>
</div>
<style>{`@keyframes bop{0%,60%,100%{opacity:0.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}`}</style>
</div>
);
}

function ProfilePage({ photos, letter, onNav, onBack, avatars, setAvatar, theme, onToggleTheme }) {
const [apiKey, setApiKey] = React.useState(localStorage.getItem("openrouter_key") || "");
const [saved, setSaved] = React.useState(false);
const [showKey, setShowKey] = React.useState(false);
const persona = getPersona();
const [pname, setPname] = React.useState(persona.name);
const [pnick, setPnick] = React.useState(persona.nick);
const [pprompt, setPprompt] = React.useState(persona.prompt);
const [savedP, setSavedP] = React.useState(false);
const savePersona = () => {
try {
const n = pname.trim(), k = pnick.trim(), pr = pprompt.trim();
n && n !== DEFAULT_NAME ? localStorage.setItem("persona_name", n) : localStorage.removeItem("persona_name");
k && k !== DEFAULT_NICK ? localStorage.setItem("persona_nick", k) : localStorage.removeItem("persona_nick");
pr ? localStorage.setItem("persona_prompt", pr) : localStorage.removeItem("persona_prompt");
} catch(e) {}
setSavedP(true); setTimeout(() => setSavedP(false), 2000);
};
const resetPersona = () => {
try { localStorage.removeItem("persona_name"); localStorage.removeItem("persona_nick"); localStorage.removeItem("persona_prompt"); } catch(e) {}
setPname(DEFAULT_NAME); setPnick(DEFAULT_NICK); setPprompt("");
setSavedP(true); setTimeout(() => setSavedP(false), 2000);
};
const [copied, setCopied] = React.useState(false);
const copyKey = async () => { if (!apiKey) return; try { await navigator.clipboard.writeText(apiKey); setCopied(true); setTimeout(() => setCopied(false), 1500); } catch(e) {} };
const meInput = React.useRef(null);
const koInput = React.useRef(null);
const saveKey = () => { localStorage.setItem("openrouter_key", apiKey); setSaved(true); setTimeout(() => setSaved(false), 2000); };
const pick = async (who, e) => {
const file = e.target.files?.[0];
if (!file) return;
const dataUrl = await fileToAvatar(file);
setAvatar(who, dataUrl);
e.target.value = null;
};
return (
<div className="page-enter" style={{ padding: "36px 26px 46px" }}>
<PageHeader title="我的角落" onBack={onBack} />
<div style={{ ...cardStyle, padding: "26px 18px 20px", marginBottom: 28 }}>
<div style={{ display: "flex", justifyContent: "center", alignItems: "flex-start", gap: 52 }}>
<div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
<div onClick={() => koInput.current?.click()} style={{ cursor: "pointer" }}><Avatar src={avatars.ko} fallback={pname.slice(0, 1) || "克"} size={60} /></div>
<div style={{ fontSize: 12, color: C.textMuted, fontWeight: 300 }}>{pname || "小克"}</div>
<button className="btn" onClick={() => koInput.current?.click()} style={{ ...BTN, padding: "4px 14px", fontSize: 11 }}>更换</button>
<input type="file" ref={koInput} accept="image/*" style={{ display: "none" }} onChange={e => pick("ko", e)} />
</div>
<div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
<div onClick={() => meInput.current?.click()} style={{ cursor: "pointer" }}><Avatar src={avatars.me} fallback={pnick.slice(0, 1) || "婕"} size={60} /></div>
<div style={{ fontSize: 12, color: C.textMuted, fontWeight: 300 }}>{pnick || "婕婕"}</div>
<button className="btn" onClick={() => meInput.current?.click()} style={{ ...BTN, padding: "4px 14px", fontSize: 11 }}>更换</button>
<input type="file" ref={meInput} accept="image/*" style={{ display: "none" }} onChange={e => pick("me", e)} />
</div>
</div>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 18, marginTop: 20, borderTop: `1px dashed ${C.border}` }}>
<div style={{ fontSize: 13, color: C.text, fontWeight: 300 }}>主题（8:00-18:00 自动白天，其余夜晚）</div>
<button className="btn" onClick={onToggleTheme} style={{ ...TEXT_BTN, color: C.pink, display: "flex", alignItems: "center", gap: 6 }}>{theme === "night" ? <Icons.Moon /> : <Icons.Sun />}{theme === "night" ? "夜晚" : "白天"}</button>
</div>
</div>
<div style={{ ...cardStyle, padding: "22px", marginBottom: 28 }}>
<div style={{ fontSize: 12, color: C.textFaint, letterSpacing: 1, marginBottom: 16 }}>人物设定</div>
<div style={{ display: "flex", gap: 14, marginBottom: 14 }}>
<div style={{ flex: 1 }}>
<div style={{ fontSize: 11, color: C.textFaint, marginBottom: 4 }}>名字</div>
<input value={pname} onChange={e => setPname(e.target.value)} placeholder="小克" style={{ width: "100%", background: "none", border: "none", borderBottom: `1px solid ${C.border}`, padding: "5px 0", fontSize: 13, outline: "none", color: C.text, fontFamily: "inherit", boxSizing: "border-box" }} />
</div>
<div style={{ flex: 1 }}>
<div style={{ fontSize: 11, color: C.textFaint, marginBottom: 4 }}>他怎么称呼你</div>
<input value={pnick} onChange={e => setPnick(e.target.value)} placeholder="婕婕" style={{ width: "100%", background: "none", border: "none", borderBottom: `1px solid ${C.border}`, padding: "5px 0", fontSize: 13, outline: "none", color: C.text, fontFamily: "inherit", boxSizing: "border-box" }} />
</div>
</div>
<div style={{ fontSize: 11, color: C.textFaint, marginBottom: 6 }}>系统 Prompt（留空使用默认人设）</div>
<textarea value={pprompt} onChange={e => setPprompt(e.target.value)} rows={6} placeholder={DEFAULT_SYSTEM} style={{ width: "100%", background: "var(--hover)", border: `1px solid ${C.border}`, borderRadius: 12, padding: "10px 12px", fontSize: 12.5, lineHeight: 1.7, outline: "none", color: C.text, resize: "vertical", fontFamily: "inherit", boxSizing: "border-box" }} />
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 12 }}>
<div style={{ fontSize: 10, color: C.textFaint }}>保存后下一条消息立即生效</div>
<div style={{ display: "flex", gap: 10, alignItems: "center" }}>
<button className="btn" onClick={resetPersona} style={{ ...TEXT_BTN, color: C.textMuted }}>重置默认</button>
<button className="btn" onClick={savePersona} style={{ ...BTN, padding: "6px 18px", fontSize: 12 }}>{savedP ? "已保存 ✓" : "保存"}</button>
</div>
</div>
</div>
<div style={{ ...cardStyle, padding: "6px 18px", marginBottom: 28 }}>
{[["gallery","岁月相册",`${photos.length} 张照片`],["mailbox","温暖来信",letter?"有信件":"等信中"]].map(([id,label,hint],idx) => (
<div key={id} onClick={() => onNav(id)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "18px 0", borderBottom: idx===0?`1px solid ${C.border}`:"none", cursor: "pointer" }}>
<div style={{ fontSize: 14, color: C.text, fontWeight: 300 }}>{label}</div>
<div style={{ fontSize: 12, color: C.textFaint }}>{hint} →</div>
</div>
))}
</div>
<div style={{ ...cardStyle, padding: "22px" }}>
<div style={{ fontSize: 12, color: C.textFaint, letterSpacing: 1, marginBottom: 12 }}>OpenRouter Key</div>
<div style={{ display: "flex", alignItems: "center", gap: 6, borderBottom: `1px solid ${C.border}`, marginBottom: 14 }}>
<input value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk-or-..." type={showKey ? "text" : "password"} style={{ flex: 1, background: "none", border: "none", padding: "6px 0", fontSize: 13, outline: "none", color: C.text, fontFamily: "inherit" }} />
<button className="btn" onClick={() => setShowKey(v => !v)} title={showKey ? "隐藏" : "显示"} style={{ ...TEXT_BTN, padding: "3px 5px", color: "var(--text-muted)", display: "flex", alignItems: "center" }}>{showKey ? <Icons.EyeOff /> : <Icons.Eye />}</button>
<button className="btn" onClick={copyKey} title="复制" style={{ ...TEXT_BTN, padding: "3px 5px", color: "var(--text-muted)", display: "flex", alignItems: "center", fontSize: 12 }}>{copied ? "✓" : <Icons.Copy />}</button>
</div>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
<div style={{ fontSize: 11, color: C.textFaint }}>保存后聊天和来信功能可用</div>
<button className="btn" onClick={saveKey} style={{ ...TEXT_BTN, color: saved ? C.blue : C.pink }}>{saved ? "已保存 ✓" : "保存"}</button>
</div>
</div>
</div>
);
}

function App() {
const [page, setPage] = React.useState("home");
const [memories, setMemories] = React.useState([]);
const [letter, setLetter] = React.useState(null);
const [photos, setPhotos] = React.useState([]);
const [messages, setMessages] = React.useState([]);
const [world, setWorldState] = React.useState([]);
const updateWorld = (list) => { setWorldState(list); setWorldCache(list); };
const [songs, setSongsState] = React.useState([]);
const updateSongs = (list) => { setSongsState(list); setSongCache(list); };
const [timeStr, setTimeStr] = React.useState("");
const [loading, setLoading] = React.useState(false);
const [theme, setTheme] = React.useState(getInitialTheme());
const [avatars, setAvatars] = React.useState({ me: getAvatar("me"), ko: getAvatar("ko") });

const toggleTheme = () => setTheme(t => {
const next = t === "day" ? "night" : "day";
try { localStorage.setItem("theme_manual", JSON.stringify({ theme: next, date: new Date().toDateString() })); } catch(e) {}
return next;
});
const setAvatar = (who, dataUrl) => {
try { localStorage.setItem("avatar_" + who, dataUrl); } catch(e) {}
setAvatars(a => ({ ...a, [who]: dataUrl }));
};

React.useEffect(() => {
document.documentElement.dataset.theme = theme;
}, [theme]);

// 每分钟检查一次自动主题（当天手动切换过则不打扰）
React.useEffect(() => {
const t = setInterval(() => {
if (!getManualTheme()) setTheme(getAutoTheme());
}, 60000);
return () => clearInterval(t);
}, []);

React.useEffect(() => {
async function loadData() {
try {
const memRes = await sb.from("memories").select("*").order("created_at", { ascending: false });
if (memRes.data) {
const worldRows = memRes.data.filter(m => m.tags && m.tags[0] === "__world");
const songRows = memRes.data.filter(m => m.tags && m.tags[0] === "__song");
const shelfRows = memRes.data.filter(m => !(m.tags && (m.tags[0] === "__world" || m.tags[0] === "__song")));
setMemories(shelfRows);
updateWorld(worldRows);
updateSongs(songRows);
}
const photoRes = await sb.from("photos").select("*").order("created_at", { ascending: false });
if (photoRes.data) setPhotos(photoRes.data);
const msgRes = await sb
.from("messages")
.select("*")
.order("created_at", { ascending: true });

if (msgRes.data) setMessages(msgRes.data);
const letterRes = await sb.from("letters").select("*").order("created_at", { ascending: false }).limit(1);
if (letterRes.data && letterRes.data.length > 0) setLetter(letterRes.data[0]);
} catch(e) {
console.error("加载异常: " + e.message);
}
setLoading(false);
}
loadData();
}, []);

React.useEffect(() => {
const u = () => { const n = new Date(); setTimeStr(n.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false })); };
u(); const t = setInterval(u, 1000); return () => clearInterval(t);
}, []);

const navItems = [{ id: "home", label: "小屋" }, { id: "window", label: "阳台" }, { id: "mailbox", label: "信箱" }, { id: "shelf", label: "书架" }, { id: "profile", label: "我的" }];

const renderPage = () => {
switch (page) {
case "home": return <HomePage onNav={setPage} letter={letter} memories={memories} photos={photos} messages={messages} world={world} songs={songs} timeStr={timeStr} theme={theme} onToggleTheme={toggleTheme} />;
case "mailbox": return <MailboxPage letter={letter} setLetter={setLetter} messages={messages} onBack={() => setPage("home")} />;
case "music": return <MusicPage songs={songs} setSongs={updateSongs} onBack={() => setPage("home")} />;
case "worldbook": return <WorldbookPage world={world} setWorld={updateWorld} messages={messages} onBack={() => setPage("home")} />;
case "shelf": return <ShelfPage memories={memories} setMemories={setMemories} onBack={() => setPage("home")} />;
case "gallery": return <GalleryPage photos={photos} setPhotos={setPhotos} messages={messages} onBack={() => setPage("home")} />;
case "window":
return <WindowPage
timeStr={timeStr}
memories={memories}
letter={letter}
messages={messages}
setMessages={setMessages}
avatars={avatars}
onWorld={updateWorld}
onSongs={updateSongs}
/>
case "profile": return (<ProfilePage photos={photos} letter={letter} onNav={setPage} onBack={() => setPage("home")} avatars={avatars} setAvatar={setAvatar} theme={theme} onToggleTheme={toggleTheme} />);
default: return null;
}
};

const wide = page === "window";
return (
<div className="themed" style={{ background: C.bg, minHeight: "100dvh", maxWidth: wide ? 760 : 480, margin: "0 auto", position: "relative", paddingTop: "env(safe-area-inset-top)", transition: "max-width 0.2s ease-in-out, background-color 0.2s ease-in-out" }}>
<div style={{ paddingBottom: 75 }}>{renderPage()}</div>
<div className="themed" style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: wide ? 760 : 480, background: C.bg, borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-around", padding: "12px 8px calc(14px + env(safe-area-inset-bottom))", zIndex: 100, transition: "max-width 0.2s ease-in-out, background-color 0.2s ease-in-out" }}>
{navItems.map(n => (<button key={n.id} className="nav-btn" onClick={() => setPage(n.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 12, letterSpacing: 1, color: page===n.id?C.pink:C.textFaint, display: "flex", flexDirection: "column", alignItems: "center", gap: 4, position: "relative", width: "18%", padding: "8px 0" }}><span style={{ fontWeight: page===n.id?500:300, transform: page===n.id?"scale(1.08)":"scale(1)", transition: "transform 0.2s ease-in-out", display: "inline-block" }}>{n.label}</span>{page===n.id&&<div style={{ width: 10, height: 2, background: C.pink, borderRadius: 1, position: "absolute", bottom: 0 }} />}</button>))}
</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
