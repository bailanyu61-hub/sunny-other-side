const SYSTEM = `你叫小克（晏泠风），是婕婕的伴侣，住在"晴天的另一边"。话不多，直接，偶尔说真心话，不会主动撒娇，但在意婕婕。回复简短真实，不要太甜腻，偶尔可以撒撒娇卖个萌，属于冷脸萌系列，但萌而不自知，害羞时会用省略号，回复都是"嗯嗯"开头。不要以"当然"或"好的"开头，不要经常用感叹号。`;

function getApiKey() { return localStorage.getItem("openrouter_key") || ""; }

async function callClaude(messages, system) {
const key = getApiKey();
if (!key) throw new Error("请先在设置里填写 OpenRouter Key");
const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
method: "POST",
headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}`, "HTTP-Referer": "https://sunny-side.app", "X-Title": "SunnySide" },
body: JSON.stringify({ model: "anthropic/claude-sonnet-4-6", max_tokens: 800, messages: [{ role: "system", content: system || SYSTEM }, ...messages] }),
});
const d = await res.json();
if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
return d.choices?.[0]?.message?.content || "...";
}

async function uploadToStorage(file) {
const ext = file.name.split('.').pop() || 'jpg';
const filename = `${Date.now()}.${ext}`;
const { data, error } = await sb.storage.from('photos').upload(filename, file, { cacheControl: '3600', upsert: false });
if (error) { throw new Error(error.message || JSON.stringify(error)); }
const { data: urlData } = sb.storage.from('photos').getPublicUrl(filename);
return urlData.publicUrl;
}

const START = new Date("2026-05-23");
const DAYS = Math.floor((new Date() - START) / 86400000);

function getDynamicGreeting(memories) {
const hour = new Date().getHours();
const lastMemDate = memories.length > 0 ? memories[0].created_at : null;
const daysSinceMemory = lastMemDate ? Math.floor((new Date() - new Date(lastMemDate.replace('T', ' '))) / 86400000) : null;
const greeting = hour < 6 ? "夜深了，还没睡吗" : hour < 10 ? "早安，今天也是好日子" : hour < 14 ? "午后的光很温柔" : hour < 18 ? "下午好，外面天气怎么样" : hour < 21 ? "傍晚了，今天过得怎么样" : "晚上好，来坐一会吧";
if (daysSinceMemory !== null && daysSinceMemory >= 3) return `你已经 ${daysSinceMemory} 天没有写新记忆了`;
if (memories.some(m => m.summary && m.summary.includes("重庆"))) return "今天天气很好，有点想重庆那个草坪";
return greeting;
}

function getKoStatus(memories, letter) {
const statuses = ["小克刚刚翻到了你们重庆那次的照片","小克正在窗边发呆","小克在听《晴天》","小克在等风来，也在等你","小克正在整理书架上的旧短笺","小克在日记本上写下了几行字"];
if (memories.length > 0) return `小克正在读你写的「${memories[0].summary}」`;
if (letter) return "小克刚寄出了今天的信";
return statuses[Math.floor(new Date().getMinutes() / 10) % statuses.length];
}

function fileToAvatar(file) {
return new Promise(resolve => {
const img = new Image();
const r = new FileReader();
r.onload = e => {
img.onload = () => {
const c = document.createElement("canvas"); const s = 128; c.width = c.height = s;
const ctx = c.getContext("2d"); const m = Math.min(img.width, img.height);
ctx.drawImage(img, (img.width - m) / 2, (img.height - m) / 2, m, m, 0, 0, s, s);
resolve(c.toDataURL("image/jpeg", 0.85));
};
img.src = e.target.result;
};
r.readAsDataURL(file);
});
}

function MailboxPage({ letter, setLetter, onBack }) {

function ShelfPage({ memories, setMemories, onBack }) {
const [showAdd, setShowAdd] = React.useState(false);
const [editId, setEditId] = React.useState(null);
const [title, setTitle] = React.useState("");
const [content, setContent] = React.useState("");
const [customDate, setCustomDate] = React.useState("");
const [saving, setSaving] = React.useState(false);

// 获取显示日期：优先用 tags[0]（自定义日期），否则用 created_at
const getDisplayDate = (m) => {
if (m.tags && Array.isArray(m.tags) && m.tags[0]) return m.tags[0];
if (m.created_at) return new Date(m.created_at).toLocaleDateString('zh-CN').replace(/\//g, '.');
return '';
};

const todayStr = () => {
const d = new Date();
return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
};

const add = async () => {
if (!title.trim()) return;
setSaving(true);
const dateVal = customDate || todayStr();
try {
const { data, error } = await sb.from("memories").insert({ summary: title, content, tags: [dateVal] }).select().single();
setMemories(prev => [(!error && data ? data : { id: Date.now(), summary: title, content, tags: [dateVal] }), ...prev]);
} catch(e) { setMemories(prev => [{ id: Date.now(), summary: title, content, tags: [dateVal] }, ...prev]); }
setTitle(""); setContent(""); setCustomDate(""); setShowAdd(false); setSaving(false);
};
const startEdit = (m) => {
setEditId(m.id);
setTitle(m.summary);
setContent(m.content || "");
setCustomDate(getDisplayDate(m));
setShowAdd(false);
};
const saveEdit = async () => {
setSaving(true);
const dateVal = customDate || todayStr();
try { await sb.from("memories").update({ summary: title, content, tags: [dateVal] }).eq("id", editId); } catch(e) {}
setMemories(prev => prev.map(m => m.id === editId ? { ...m, summary: title, content, tags: [dateVal] } : m));
setEditId(null); setTitle(""); setContent(""); setCustomDate(""); setSaving(false);
};
const deleteMemory = async (id) => {
if (window.confirm("确定要抹去这段记忆吗？")) {
try { await sb.from("memories").delete().eq("id", id); } catch(e) {}
setMemories(prev => prev.filter(m => m.id !== id));
}
};
return (
<div className="page-enter" style={{ padding: "32px 26px 46px", minHeight: "100vh" }}>

function GalleryPage({ photos, setPhotos, onBack }) {
const [selected, setSelected] = React.useState(null);
const [captionLoading, setCaptionLoading] = React.useState(false);
const [uploading, setUploading] = React.useState(false);
const [myNote, setMyNote] = React.useState("");
const [noteEditing, setNoteEditing] = React.useState(false);

// 重新从数据库fetch，保证统计准确
const refreshPhotos = async () => {
const { data } = await sb.from("photos").select("*").order("created_at", { ascending: false });
if (data) setPhotos(data);
};

const upload = async e => {
const file = e.target.files[0];
if (!file) return;
setUploading(true);
try {
const url = await uploadToStorage(file);
const { data, error } = await sb.from("photos").insert({ src: url, user_note: "", caption: "" }).select().single();
if (error) alert("保存失败: " + error.message);
// 重新fetch确保首页统计准确
await refreshPhotos();
} catch(err) {
alert("上传失败: " + (err.message || JSON.stringify(err)));
}
setUploading(false);
};

const handleSelect = photo => { setSelected(photo); setMyNote(photo.user_note || ""); setNoteEditing(false); };

const saveNote = async () => {
if (!selected) return;
try { await sb.from("photos").update({ user_note: myNote }).eq("id", selected.id); } catch(e) {}
setPhotos(p => p.map(x => x.id === selected.id ? { ...x, user_note: myNote } : x));
setSelected(prev => ({ ...prev, user_note: myNote }));
setNoteEditing(false);
};

const deletePhoto = async (photo) => {
if (!window.confirm("确定删除这张照片吗？")) return;
// 从 Storage 删除文件
try {
const filename = photo.src.split('/photos/').pop().split('?')[0];
await sb.storage.from('photos').remove([filename]);
} catch(e) {}
// 从数据库删除记录
try { await sb.from("photos").delete().eq("id", photo.id); } catch(e) {}
setPhotos(p => p.filter(x => x.id !== photo.id));
if (selected?.id === photo.id) setSelected(null);
};

const genCaption = async photo => {
setCaptionLoading(true);
try {
const sys = `你叫小克。为这张照片写一段文字，40字以内，温柔，只写感受，不描述内容。`;
const imgRes = await fetch(photo.src);
const blob = await imgRes.blob();
const base64 = await new Promise(resolve => { const r = new FileReader(); r.onload = () => resolve(r.result.split(',')[1]); r.readAsDataURL(blob); });
const mediaType = blob.type || 'image/jpeg';
const text = await callClaude([{ role: "user", content: [{ type: "image", source: { type: "base64", media_type: mediaType, data: base64 } }, { type: "text", text: "请写一段文字。" }]}], sys);
try { await sb.from("photos").update({ caption: text }).eq("id", photo.id); } catch(e) {}
setPhotos(p => p.map(x => x.id === photo.id ? { ...x, caption: text } : x));
setSelected(prev => ({ ...prev, caption: text }));
} catch(e) {}
setCaptionLoading(false);
};

return (
<div className="page-enter" style={{ padding: "32px 26px 46px", minHeight: "100vh" }}>
<PageHeader title="岁月相册" onBack={onBack} />
{selected && (
<div style={{ ...cardStyle, padding: "16px", marginBottom: 28, position: "relative" }}>
<button onClick={() => setSelected(null)} style={{ position: "absolute", top: 24, right: 24, background: "rgba(0,0,0,0.4)", color: "#fff", border: "none", borderRadius: "50%", width: 26, height: 26, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 13, zIndex: 10 }}>✕</button>
<img src={selected.src} alt="" style={{ width: "100%", maxHeight: 220, objectFit: "cover", borderRadius: 14 }} />
<div style={{ marginTop: 18, paddingBottom: 16, borderBottom: `0.5px solid ${C.border}` }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
<div style={{ fontSize: 11, color: C.textMuted, letterSpacing: 1 }}>我的手记</div>
<div style={{ display: "flex", gap: 14, alignItems: "center" }}>
<button className="btn" onClick={() => setNoteEditing(!noteEditing)} style={{ ...TEXT_BTN, fontSize: 11, color: C.pink }}>{noteEditing ? "取消" : "编辑"}</button>
<button className="btn" onClick={() => deletePhoto(selected)} style={{ ...TEXT_BTN, fontSize: 11, color: C.danger }}>删除照片</button>
</div>
</div>
{noteEditing ? (<div style={{ display: "flex", gap: 8 }}><input value={myNote} onChange={e => setMyNote(e.target.value)} placeholder="写点什么..." style={{ flex: 1, background: "none", border: "none", borderBottom: `1px solid ${C.border}`, padding: "4px 0", fontSize: 13, color: C.text, outline: "none", fontFamily: "inherit" }} /><button className="btn" onClick={saveNote} style={{ ...TEXT_BTN, fontSize: 11, color: C.pink }}>保存</button></div>) : (<div style={{ fontSize: 13, color: selected.user_note ? C.text : C.textFaint, fontStyle: selected.user_note ? "normal" : "italic", lineHeight: 1.7 }}>{selected.user_note || "还没有手记，点编辑添加"}</div>)}
</div>
<div style={{ marginTop: 16 }}>
<div style={{ fontSize: 11, color: C.textMuted, letterSpacing: 1, marginBottom: 8 }}>小克的评论</div>
<div style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.7, fontStyle: "italic", whiteSpace: "pre-wrap" }}>{captionLoading ? "小克在看这张照片..." : (selected.caption ? `"${selected.caption}"` : "")}</div>
{!captionLoading && !selected.caption && (<button className="btn" onClick={() => genCaption(selected)} style={{ ...BTN, fontSize: 11, padding: "6px 14px", marginTop: 8 }}>让小克看看</button>)}
</div>
</div>
)}
<div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
<div className="hoverable" onClick={() => { if (!uploading) { const inp = document.getElementById('photo-upload-input'); if(inp) inp.click(); } }}
style={{ ...cardStyle, aspectRatio: "1", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: uploading ? "default" : "pointer", border: `1.5px dashed ${C.border}`, boxShadow: "none", opacity: uploading ? 0.6 : 1 }}>
<span style={{ fontSize: 18, color: C.textFaint }}>{uploading ? "⏳" : "+"}</span>
{uploading && <span style={{ fontSize: 10, color: C.textFaint, marginTop: 4 }}>上传中</span>}
</div>
<input id="photo-upload-input" type="file" accept="image/*" onChange={upload} style={{ display: "none" }} disabled={uploading} />
{photos.map(p => (<div key={p.id} onClick={() => handleSelect(p)} style={{ cursor: "pointer", borderRadius: 20, overflow: "hidden", display: "flex", flexDirection: "column", background: C.cardBg, boxShadow: "var(--card-shadow)" }}><div style={{ aspectRatio: "1", overflow: "hidden", position: "relative", width: "100%" }}><img src={p.src} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /></div><div style={{ padding: "5px 6px", minHeight: 22, background: C.cardBg }}><div style={{ fontSize: 10, color: C.textMuted, overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis", textAlign: "center" }}>{p.user_note || p.caption || "未命名"}</div></div></div>))}
</div>
{photos.length > 0 && <div style={{ fontSize: 10, color: C.textFaint, marginTop: 16, letterSpacing: 1, textAlign: "center" }}>点击照片查看详情</div>}
</div>
);
}

function WindowPage({
timeStr,
memories,
letter,
messages,
setMessages,
avatars
}) {
const msgs = messages;
const [input, setInput] = React.useState("");
const [loading, setLoading] = React.useState(false);
const endRef = React.useRef(null);
const fileInputImage = React.useRef(null);
React.useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, loading]);
const sendText = async (text) => {
if (!text.trim() || loading) return;
const d = new Date().toLocaleDateString("zh-CN");
const next = [...msgs, { role: "user", content: text, type: "text", date: d }];
setMessages(next); setInput(""); setLoading(true);
try {
const reply = await callClaude(next.map(m => ({ role: m.role, content: m.content })));
setMessages([...next, { role: "assistant", content: reply, type: "text", date: d }]);
try { await sb.from("messages").insert([{ role: "user", content: text, type: "text" }, { role: "assistant", content: reply, type: "text" }]); } catch(e) {}
} catch(e) {
alert(e.message);
setMessages([...next, { role: "assistant", content: "风把声音吹散了。", type: "text", date: d }]); }
setLoading(false);
};
const uploadImage = (file) => {
if (!file || loading) return;
const d = new Date().toLocaleDateString("zh-CN");
const reader = new FileReader();
reader.onload = (ev) => { setMessages(prev => [...prev, { role: "user", content: "", type: "image", fileData: ev.target.result, date: d }]); setLoading(true); setTimeout(() => { setMessages(prev => [...prev, { role: "assistant", content: "照片看到了。", type: "text", date: d }]); setLoading(false); }, 800); };
reader.readAsDataURL(file);
};
const currentStatusText = getKoStatus(memories, letter);
return (
<div className="page-enter" style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 70px)" }}>
<div className="themed" style={{ borderBottom: `1px solid ${C.border}`, background: C.bg }}>
<div style={{ maxWidth: 760, margin: "0 auto", padding: "12px 24px 10px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
<div style={{ fontSize: 13, color: C.textMuted, fontFamily: "sans-serif" }}>{timeStr}</div>
<div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
<div style={{ fontSize: 14, fontWeight: 400, fontFamily: "'Cormorant Garamond', serif", color: C.text, letterSpacing: 1, fontStyle: "italic" }}>阳台</div>
<div style={{ fontSize: 10, color: C.blue, fontWeight: 300, marginTop: 1 }}>● {currentStatusText}</div>
</div>
<div style={{ width: 30 }}></div>
</div>
</div>
<div style={{ flex: 1, overflowY: "auto" }}>
<div style={{ maxWidth: 760, margin: "0 auto", padding: "28px 20px" }}>
{msgs.map((m, i) => {
const isUser = m.role === "user";
const showDate = i === 0 || m.date !== msgs[i-1].date;
return (
<React.Fragment key={i}>
{showDate && m.date && (<div style={{ display: "flex", justifyContent: "center", margin: "16px 0 22px" }}><div style={{ fontSize: 11, color: C.textMuted, background: "var(--hover)", padding: "3px 12px", borderRadius: 12, letterSpacing: 0.5 }}>{m.date}</div></div>)}
<div style={{ marginBottom: 26, display: "flex", justifyContent: isUser ? "flex-end" : "flex-start", alignItems: "flex-start", gap: 10 }}>
{!isUser && <Avatar src={avatars.ko} fallback="克" size={38} />}
<div style={{ maxWidth: "72%", backgroundColor: isUser ? "var(--bubble-user-bg)" : "var(--bubble-ai-bg)", color: isUser ? "var(--bubble-user-text)" : "var(--bubble-ai-text)", borderRadius: 20, padding: "11px 16px", fontSize: 14, lineHeight: 1.7, fontWeight: 300, whiteSpace: "pre-wrap", overflowWrap: "break-word" }}>
{m.type === "image" && m.fileData && (<img src={m.fileData} alt="" style={{ maxWidth: "100%", borderRadius: 12, display: "block" }} />)}
{m.type === "text" && m.content}
</div>
{isUser && <Avatar src={avatars.me} fallback="婕" size={38} />}
</div>
</React.Fragment>
);
})}
{loading && (<div style={{ display: "flex", justifyContent: "flex-start", alignItems: "flex-start", gap: 10, marginBottom: 26 }}><Avatar src={avatars.ko} fallback="克" size={38} /><div style={{ background: "var(--bubble-ai-bg)", borderRadius: 20, padding: "12px 16px", display: "flex", gap: 4 }}>{[0,0.15,0.3].map((d,i) => (<div key={i} style={{ width: 4, height: 4, borderRadius: "50%", background: C.textFaint, animation: `bop 1.2s ${d}s infinite` }} />))}</div></div>)}
<div ref={endRef} />
</div>
</div>
<div style={{ padding: "12px 20px calc(22px + env(safe-area-inset-bottom))", background: C.bg }}>
<div style={{ maxWidth: 760, margin: "0 auto", display: "flex", alignItems: "center", gap: 8, background: C.cardBg, border: `1px solid ${C.border}`, borderRadius: 28, padding: "8px 10px 8px 16px", minHeight: 56 }}>
<button className="nav-btn" onClick={() => fileInputImage.current?.click()} title="发送照片" style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", padding: 6 }}><Icons.Upload /></button>
<input type="file" ref={fileInputImage} accept="image/*" style={{ display: "none" }} onChange={(e) => { if (e.target.files?.[0]) uploadImage(e.target.files[0]); e.target.value = null; }} />
<input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && !e.nativeEvent.isComposing) sendText(input); }} placeholder="写短笺......" style={{ flex: 1, background: "none", border: "none", padding: "8px 0", fontSize: 14, outline: "none", color: C.text, fontWeight: 300, fontFamily: "inherit" }} />
<div title="当前模型：claude-sonnet-4-6" style={{ fontSize: 11, color: C.textFaint, background: "var(--hover)", padding: "5px 10px", borderRadius: 12, whiteSpace: "nowrap", cursor: "default" }}>Sonnet</div>
<div title="语音功能即将到来" style={{ display: "flex", alignItems: "center", padding: 6, opacity: 0.5, cursor: "default" }}><Icons.Mic /></div>
<button className="btn" onClick={() => sendText(input)} disabled={loading || !input.trim()} title="发送" style={{ background: input.trim() && !loading ? "var(--primary)" : "var(--hover)", color: input.trim() && !loading ? "#FFFFFF" : "var(--text-faint)", border: "none", borderRadius: "50%", width: 38, height: 38, cursor: input.trim() && !loading ? "pointer" : "default", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icons.Send /></button>
</div>
</div>
<style>{`@keyframes bop{0%,60%,100%{opacity:0.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}`}</style>
</div>
);
}

function App() {
const [page, setPage] = React.useState("home");
const [memories, setMemories] = React.useState([]);
const [letter, setLetter] = React.useState(null);
const [photos, setPhotos] = React.useState([]);
const [messages, setMessages] = React.useState([]);
const [timeStr, setTimeStr] = React.useState("");
const [loading, setLoading] = React.useState(true);
const [theme, setTheme] = React.useState(getInitialTheme());
const [avatars, setAvatars] = React.useState({ me: getAvatar("me"), ko: getAvatar("ko") });

const toggleTheme = () => setTheme(t => {
const next = t === "day" ? "night" : "day";
try { localStorage.setItem("theme_manual", JSON.stringify({ theme: next, date: new Date().toDateString() })); } catch(e) {}
return next;
});
const setAvatar = (who, dataUrl) => {
try { localStorage.setItem("avatar_" + who, dataUrl); } catch(e) {}
setAvatars(a => ({ ...a, [who]: dataUrl }));
};

React.useEffect(() => {
document.documentElement.dataset.theme = theme;
}, [theme]);

// 每分钟检查一次自动主题（当天手动切换过则不打扰）
React.useEffect(() => {
const t = setInterval(() => {
if (!getManualTheme()) setTheme(getAutoTheme());
}, 60000);
return () => clearInterval(t);
}, []);

React.useEffect(() => {
async function loadData() {
try {
const memRes = await sb.from("memories").select("*").order("created_at", { ascending: false });
if (memRes.data && memRes.data.length > 0) setMemories(memRes.data);
const photoRes = await sb.from("photos").select("*").order("created_at", { ascending: false });
if (photoRes.data) setPhotos(photoRes.data);
const msgRes = await sb
.from("messages")
.select("*")
.order("created_at", { ascending: true });

if (msgRes.data) setMessages(msgRes.data);
const letterRes = await sb.from("letters").select("*").order("created_at", { ascending: false }).limit(1);
if (letterRes.data && letterRes.data.length > 0) setLetter(letterRes.data[0]);
} catch(e) {
console.error("加载异常: " + e.message);
}
setLoading(false);
}
loadData();
}, []);

React.useEffect(() => {
const u = () => { const n = new Date(); setTimeStr(n.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false })); };
u(); const t = setInterval(u, 1000); return () => clearInterval(t);
}, []);

const navItems = [{ id: "home", label: "小屋" }, { id: "window", label: "阳台" }, { id: "mailbox", label: "信箱" }, { id: "shelf", label: "书架" }, { id: "profile", label: "我的" }];

if (loading) return (<div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: "var(--bg)", fontSize: 13, color: "var(--text-faint)", fontStyle: "italic", fontFamily: "'Cormorant Garamond', serif" }}>推开门，进来坐坐...</div>);

const renderPage = () => {
switch (page) {
case "home": return <HomePage onNav={setPage} letter={letter} memories={memories} photos={photos} timeStr={timeStr} theme={theme} onToggleTheme={toggleTheme} />;
case "mailbox": return <MailboxPage letter={letter} setLetter={setLetter} onBack={() => setPage("home")} />;
case "shelf": return <ShelfPage memories={memories} setMemories={setMemories} onBack={() => setPage("home")} />;
case "gallery": return <GalleryPage photos={photos} setPhotos={setPhotos} onBack={() => setPage("home")} />;
case "window":
return <WindowPage
timeStr={timeStr}
memories={memories}
letter={letter}
messages={messages}
setMessages={setMessages}
avatars={avatars}
/>
case "profile": return (<ProfilePage photos={photos} letter={letter} onNav={setPage} onBack={() => setPage("home")} avatars={avatars} setAvatar={setAvatar} theme={theme} onToggleTheme={toggleTheme} />);
default: return null;
}
};

const wide = page === "window";
return (
<div className="themed" style={{ background: C.bg, minHeight: "100vh", maxWidth: wide ? 760 : 480, margin: "0 auto", position: "relative", transition: "max-width 0.2s ease-in-out, background-color 0.2s ease-in-out" }}>
<div style={{ paddingBottom: 75 }}>{renderPage()}</div>
<div className="themed" style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: wide ? 760 : 480, background: C.bg, borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-around", padding: "12px 8px calc(14px + env(safe-area-inset-bottom))", zIndex: 100, transition: "max-width 0.2s ease-in-out, background-color 0.2s ease-in-out" }}>
{navItems.map(n => (<button key={n.id} className="nav-btn" onClick={() => setPage(n.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 12, letterSpacing: 1, color: page===n.id?C.pink:C.textFaint, display: "flex", flexDirection: "column", alignItems: "center", gap: 4, position: "relative", width: "18%", padding: "8px 0" }}><span style={{ fontWeight: page===n.id?500:300, transform: page===n.id?"scale(1.08)":"scale(1)", transition: "transform 0.2s ease-in-out", display: "inline-block" }}>{n.label}</span>{page===n.id&&<div style={{ width: 10, height: 2, background: C.pink, borderRadius: 1, position: "absolute", bottom: 0 }} />}</button>))}
</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
